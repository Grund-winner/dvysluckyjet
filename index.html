/* ============ STATE ============ */
var sessionHeaders = null;
var allHistory = [];
var lastState = null;
var currentRoundId = null;
var predictedForRoundId = null;
var pollingActive = false;
var toastTimer = null;

/* ================================================================
   DVYS MEMORY SYSTEM - Stockage persistant des historiques
   ================================================================ */
var MEM_KEY = 'dvys_memory';
var MEM_MAX = 1000;

function loadMemory() {
  try {
    var raw = localStorage.getItem(MEM_KEY);
    if (!raw) return { history: [], predictions: [], hits: 0, total: 0 };
    var m = JSON.parse(raw);
    if (!m || !Array.isArray(m.history)) return { history: [], predictions: [], hits: 0, total: 0 };
    return m;
  } catch(e) { return { history: [], predictions: [], hits: 0, total: 0 }; }
}

function saveMemory(mem) {
  try { localStorage.setItem(MEM_KEY, JSON.stringify(mem)); } catch(e) {}
}

function mergeWithMemory(apiCoefs) {
  var mem = loadMemory();
  var stored = mem.history;

  if (!stored.length) {
    mem.history = apiCoefs.slice();
    saveMemory(mem);
    return mem.history;
  }

  /* Trouver le point de chevauchement entre API et memoire stockee */
  var apiLen = apiCoefs.length;
  var storedLen = stored.length;
  var overlap = 0;

  for (var i = 0; i < Math.min(apiLen, storedLen); i++) {
    var sIdx = storedLen - apiLen + i;
    if (sIdx >= 0 && Math.abs(apiCoefs[i] - stored[sIdx]) < 0.001) {
      overlap++;
    } else {
      break;
    }
  }

  if (overlap >= Math.floor(apiLen * 0.5)) {
    /* Chevauchement significatif - mettre a jour la fin */
    var newCoefs = apiCoefs.slice(overlap);
    mem.history = stored.concat(newCoefs);
  } else {
    /* Pas de chevauchement - concatener */
    mem.history = stored.concat(apiCoefs);
  }

  /* Limiter la taille */
  if (mem.history.length > MEM_MAX) {
    mem.history = mem.history.slice(-MEM_MAX);
  }

  saveMemory(mem);
  return mem.history;
}

function recordPrediction(predicted, confidence, category) {
  var mem = loadMemory();
  mem.predictions.push({
    predicted: predicted,
    confidence: confidence,
    category: category,
    timestamp: Date.now()
  });
  if (mem.predictions.length > 200) mem.predictions = mem.predictions.slice(-200);
  saveMemory(mem);
}

function validateLastPrediction(actual) {
  var mem = loadMemory();
  var preds = mem.predictions;
  if (!preds.length) return;

  var last = preds[preds.length - 1];
  if (last.validated) return;

  /* Categorie reelle du resultat */
  var actualCat = actual < 2 ? 'low' : actual < 10 ? 'mid' : 'high';
  var hit = last.category === actualCat;

  last.validated = true;
  last.actual = actual;
  last.hit = hit;

  mem.total = (mem.total || 0) + 1;
  if (hit) mem.hits = (mem.hits || 0) + 1;

  saveMemory(mem);
}

function getAccuracy() {
  var mem = loadMemory();
  if (!mem.total || mem.total < 3) return null;
  return Math.round((mem.hits / mem.total) * 100);
}

function clearOldPredictions() {
  var mem = loadMemory();
  var cutoff = Date.now() - 3600000;
  mem.predictions = mem.predictions.filter(function(p) { return p.timestamp > cutoff; });
  saveMemory(mem);
}

/* ============ TOAST ============ */
function showToast(msg, ms) {
  ms = ms || 3000;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, ms);
}

/* ============ AUTH ============ */
function authenticate(b) {
  return fetch(AUTH_URL, {
    method: 'POST',
    headers: { 'auth-token': b, 'Content-Type': 'application/json' },
    body: '{}'
  }).then(function(r) {
    if (!r.ok) throw new Error('Auth HTTP ' + r.status);
    return r.json();
  }).then(function(data) {
    if (!data.sessionId || !data.customerId) throw new Error('No session');
    sessionHeaders = {
      'customer-id': data.customerId,
      'session-id': data.sessionId,
      'accept': 'application/json'
    };
    return data;
  });
}

/* ============ HISTORY FETCH ============ */
function fetchHistory() {
  if (!sessionHeaders) return Promise.reject('no session');
  var h = {};
  h['customer-id'] = sessionHeaders['customer-id'];
  h['session-id'] = sessionHeaders['session-id'];
  h['accept'] = 'application/json';
  return fetch(HIST_URL, { method: 'GET', headers: h }).then(function(r) {
    if (!r.ok) throw new Error('History HTTP ' + r.status);
    return r.json();
  });
}

function extractCoefs(data) {
  var values = [];
  if (!Array.isArray(data)) return values;
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    if (item.finalValues && Array.isArray(item.finalValues)) {
      for (var j = 0; j < item.finalValues.length; j++) {
        var v = parseFloat(item.finalValues[j]);
        if (v > 0) values.push(v);
      }
      continue;
    }
    var coef = item.coef || item.crash || item.value || item.topCoefficient || item.multiplier || item.coefficient;
    if (coef !== undefined) {
      var fv = parseFloat(coef);
      if (fv > 0) values.push(fv);
    }
  }
  return values;
}

/* ================================================================
   DVYS PREDICTOR V3 - Moteur intelligent adaptatif avec memoire
   8 modules ponderes, systeme de vote, base sur la moyenne
   ================================================================ */
var DVYSPredictor = (function() {

  /* --- Helpers --- */
  function avg(a){if(!a.length)return 0;var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length}
  function sd(a){if(a.length<2)return 0;var m=avg(a),s=0;for(var i=0;i<a.length;i++)s+=Math.pow(a[i]-m,2);return Math.sqrt(s/(a.length-1))}
  function ema(a,p){if(!a.length)return 0;var k=2/(p+1),e=a[0];for(var i=1;i<a.length;i++)e=a[i]*k+e*(1-k);return e}
  function cat(v){return v<2?'low':v<10?'mid':'high'}
  function rr(a,b){return a+Math.random()*(b-a)}
  function cl(v,l,h){return Math.max(l,Math.min(h,v))}
  function median(a){var s=a.slice().sort(function(x,y){return x-y});var m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2}

  /* === MODULE 1: Tendance EMA === */
  function trendModule(rev) {
    var n = rev.length;
    var e5 = ema(rev, 5);
    var e10 = n >= 10 ? ema(rev, 10) : e5;
    var macd = e5 - e10;
    var dir = 0, str = 0;
    if (macd > 0.15) { dir = 1; str = Math.min(macd / 1.5, 1); }
    else if (macd < -0.15) { dir = -1; str = Math.min(Math.abs(macd) / 1.5, 1); }
    return { dir: dir, strength: str, ema5: e5, ema10: e10, macd: macd };
  }

  /* === MODULE 2: Series / Streak === */
  function streakModule(rev) {
    var c = rev.map(cat);
    var last = c[0], len = 1;
    for (var i = 1; i < c.length; i++) {
      if (c[i] === last) len++;
      else break;
    }
    return { cat: last, len: len };
  }

  /* === MODULE 3: Markov (chaines de transition) === */
  function markovModule(rev) {
    var c = rev.map(cat), n = c.length;
    if (n < 8) return { low: 0.34, mid: 0.33, high: 0.33, top: 'mid', prob: 0.34 };
    var tr = { low:{low:0,mid:0,high:0}, mid:{low:0,mid:0,high:0}, high:{low:0,mid:0,high:0} };
    for (var i = 0; i < n - 1; i++) tr[c[i]][c[i+1]]++;
    for (var f in tr) {
      var t = tr[f].low + tr[f].mid + tr[f].high + 3;
      tr[f].low = (tr[f].low + 1) / t;
      tr[f].mid = (tr[f].mid + 1) / t;
      tr[f].high = (tr[f].high + 1) / t;
    }
    var p = tr[c[0]], top = null, tP = 0;
    for (var k in p) { if (p[k] > tP) { tP = p[k]; top = k; } }
    return { low: p.low, mid: p.mid, high: p.high, top: top, prob: tP };
  }

  /* === MODULE 4: Pattern Matching (utilise TOUT l'historique stocke) === */
  function patternModule(rev, fullHistory) {
    if (fullHistory.length < 12) return null;
    var c = fullHistory.map(cat);
    var best = null, bestScore = 0;

    for (var len = 2; len <= 4; len++) {
      if (rev.length < len) continue;
      /* Pattern = derniers 'len' resultats en ordre chronologique */
      var pat = [];
      for (var j = len - 1; j >= 0; j--) pat.push(cat(rev[j]));

      var matches = 0;
      var next = { low: 0, mid: 0, high: 0 };

      for (var i = 0; i <= c.length - len - 1; i++) {
        var eq = true;
        for (var k = 0; k < len; k++) {
          if (c[i + k] !== pat[k]) { eq = false; break; }
        }
        if (eq) {
          matches++;
          next[c[i + len]]++;
        }
      }

      if (matches >= 2) {
        var total = next.low + next.mid + next.high;
        if (total > 0) {
          var bCat = null, bV = 0;
          for (var kk in next) { if (next[kk] > bV) { bV = next[kk]; bCat = kk; } }
          var prob = bV / total;
          var score = prob * Math.min(matches, 15) * len * 0.08;
          if (score > bestScore) {
            bestScore = score;
            best = { cat: bCat, prob: prob, matches: matches, pattern: len + '-gram' };
          }
        }
      }
    }
    return best;
  }

  /* === MODULE 5: Cycles (repetition periodique sur tout l'historique) === */
  function cycleModule(fullHistory) {
    var c = fullHistory.map(cat);
    var n = c.length;
    if (n < 20) return { found: false };
    var bL = 0, bS = 0;
    for (var p = 3; p <= Math.min(15, Math.floor(n / 3)); p++) {
      var m = 0, t = 0;
      for (var i = p; i < n; i++) { t++; if (c[i] === c[i - p]) m++; }
      var sc = t > 0 ? m / t : 0;
      if (sc > bS && sc > 0.35) { bS = sc; bL = p; }
    }
    if (bL > 0) return { found: true, period: bL, score: bS };
    return { found: false };
  }

  /* === MODULE 6: Mean Reversion === */
  function meanRevModule(rev) {
    var n = rev.length;
    var s5 = avg(rev.slice(0, Math.min(5, n)));
    var s10 = n >= 10 ? avg(rev.slice(0, 10)) : s5;
    var s20 = n >= 20 ? avg(rev.slice(0, 20)) : s10;
    var last = rev[0];
    var dev = (last - s5) / Math.max(s5, 0.01);
    return { deviation: dev, shortAvg: s5, midAvg: s10, longAvg: s20, last: last };
  }

  /* === MODULE 7: Momentum === */
  function momentumModule(rev) {
    if (rev.length < 5) return { dir: 'neutral', strength: 0 };
    var ch = [];
    for (var i = 1; i < rev.length; i++) ch.push(rev[i] - rev[i-1]);
    var r3 = 0, c = Math.min(3, ch.length);
    for (var i = ch.length - c; i < ch.length; i++) r3 += ch[i];
    r3 /= c;
    var dir = 'neutral', str = 0;
    if (r3 > 0.25) { dir = 'up'; str = Math.min(r3 / 2, 1); }
    else if (r3 < -0.25) { dir = 'down'; str = Math.min(Math.abs(r3) / 2, 1); }
    return { dir: dir, strength: str, rate: r3 };
  }

  /* === MODULE 8: Volatilite === */
  function volModule(rev) {
    var n = rev.length;
    var window = rev.slice(0, Math.min(12, n));
    return sd(window);
  }

  /* ================================================================
     PREDICTION PRINCIPALE - Systeme de vote pondere
     ================================================================ */
  function predict(fullHistory) {
    if (fullHistory.length < 3) {
      return {
        prediction: cl(avg(fullHistory) + rr(-.2, .2), 1.01, 25),
        confidence: 20,
        signals: ['donnees_insuffisantes'],
        category: 'mid',
        rounds: fullHistory.length
      };
    }

    var rev = fullHistory.slice().reverse();
    var n = fullHistory.length;

    /* === Statistiques cles === */
    var longAvg = avg(fullHistory);
    var longMed = median(fullHistory);
    var recent5 = avg(rev.slice(0, Math.min(5, n)));
    var recent10 = avg(rev.slice(0, Math.min(10, n)));
    var recent20 = avg(rev.slice(0, Math.min(20, n)));

    /* === Executer tous les modules === */
    var td = trendModule(rev);
    var sk = streakModule(rev);
    var mk = markovModule(rev);
    var pm = patternModule(rev, fullHistory);
    var cy = cycleModule(fullHistory);
    var mr = meanRevModule(rev);
    var mo = momentumModule(rev);
    var vl = volModule(rev);

    /* === SYSTEME DE VOTE === */
    var votes = { low: 0, mid: 0, high: 0 };
    var signals = [];

    /* Prior bayesien base sur la distribution historique */
    if (n >= 20) {
      var pLow = 0, pMid = 0, pHigh = 0;
      for (var i = 0; i < n; i++) {
        if (fullHistory[i] < 2) pLow++;
        else if (fullHistory[i] < 10) pMid++;
        else pHigh++;
      }
      var tot = pLow + pMid + pHigh;
      votes.low += (pLow / tot) * 1.5;
      votes.mid += (pMid / tot) * 1.5;
      votes.high += (pHigh / tot) * 1.5;
    }

    /* MODULE 1: Tendance (poids 2.5) */
    if (td.dir > 0) {
      votes.mid += 1.5 * (1 - td.strength);
      votes.high += 1.0 * td.strength;
      signals.push({ text: 'tendance_haussiere', type: 'up' });
    } else if (td.dir < 0) {
      votes.low += 1.5 * (1 - td.strength);
      votes.mid += 1.0 * td.strength;
      signals.push({ text: 'tendance_baissiere', type: 'down' });
    } else {
      votes.low += 0.3; votes.mid += 1.2; votes.high += 0.3;
      signals.push({ text: 'tendance_neutre', type: 'info' });
    }

    /* MODULE 2: Markov (poids 2.0) */
    votes.low += mk.low * 2.0;
    votes.mid += mk.mid * 2.0;
    votes.high += mk.high * 2.0;
    if (mk.prob > 0.45) {
      var mType = mk.top === 'low' ? 'down' : mk.top === 'high' ? 'up' : 'info';
      signals.push({ text: 'markov_' + mk.top, type: mType });
    }

    /* MODULE 3: Pattern Matching (poids 2.0) */
    if (pm) {
      votes[pm.cat] += pm.prob * 2.0;
      var pType = pm.cat === 'low' ? 'down' : pm.cat === 'high' ? 'up' : 'info';
      signals.push({ text: 'pattern_' + pm.pattern + ' (' + pm.matches + 'x)', type: pType });
    }

    /* MODULE 4: Cycles (poids 1.5) */
    if (cy.found) {
      var posInCycle = rev.length % cy.period;
      var pastCat = rev.length > posInCycle ? cat(rev[posInCycle]) : cat(longAvg);
      votes[pastCat] += 1.5 * cy.score;
      signals.push({ text: 'cycle_p' + cy.period, type: 'info' });
    } else {
      votes.mid += 0.4;
    }

    /* MODULE 5: Mean Reversion (poids 2.0) */
    if (Math.abs(mr.deviation) > 0.4) {
      if (mr.deviation < -0.4) {
        var rStr = Math.min(Math.abs(mr.deviation) / 2, 1);
        votes.mid += 1.0 * rStr;
        votes.high += 1.0 * rStr;
        signals.push({ text: 'reversion_hausse', type: 'up' });
      } else {
        var rStr2 = Math.min(mr.deviation / 2, 1);
        votes.low += 1.0 * rStr2;
        votes.mid += 1.0 * rStr2;
        signals.push({ text: 'reversion_baisse', type: 'down' });
      }
    } else {
      votes.mid += 1.0;
      signals.push({ text: 'equilibre', type: 'info' });
    }

    /* MODULE 6: Momentum (poids 1.5) */
    if (mo.dir === 'up') {
      votes.mid += 1.0;
      votes.high += 0.5 * mo.strength;
      signals.push({ text: 'momentum_haut', type: 'up' });
    } else if (mo.dir === 'down') {
      votes.low += 0.5 * mo.strength;
      votes.mid += 1.0;
      signals.push({ text: 'momentum_bas', type: 'down' });
    } else {
      votes.mid += 0.8;
    }

    /* MODULE 7: Streak (poids 1.5) */
    if (sk.cat === 'low' && sk.len >= 4) {
      votes.mid += 0.8;
      votes.high += 0.7;
      signals.push({ text: 'rupture_basse_' + sk.len, type: 'up' });
    } else if (sk.cat === 'low' && sk.len >= 2) {
      votes.low += 0.5;
      votes.mid += 1.0;
      signals.push({ text: 'serie_basse_' + sk.len, type: 'down' });
    } else if (sk.cat === 'mid' && sk.len >= 3) {
      votes.mid += 0.8;
      votes.low += 0.3;
      votes.high += 0.4;
      signals.push({ text: 'stabilite_' + sk.len, type: 'info' });
    } else if (sk.cat === 'high' && sk.len >= 2) {
      votes.low += 0.8;
      votes.mid += 0.7;
      signals.push({ text: 'correction_haute', type: 'down' });
    } else {
      votes.mid += 0.8;
    }

    /* MODULE 8: Volatilite (poids 1.0) */
    if (vl > 4) {
      votes.high += 0.6;
      votes.low += 0.4;
      signals.push({ text: 'volatilite_extreme', type: 'info' });
    } else if (vl > 2) {
      votes.high += 0.4;
      votes.mid += 0.4;
      votes.low += 0.2;
      signals.push({ text: 'volatilite_haute', type: 'info' });
    } else if (vl < 0.6 && longAvg > 1.5) {
      votes.mid += 0.8;
      signals.push({ text: 'volatilite_faible', type: 'info' });
    } else {
      votes.mid += 0.5;
    }

    /* === DETERMINER LA CATEGORIE === */
    var totalVotes = votes.low + votes.mid + votes.high;
    var maxVote = Math.max(votes.low, votes.mid, votes.high);
    var chosenCat = 'mid';
    if (votes.low === maxVote && votes.low > votes.mid * 1.05) chosenCat = 'low';
    else if (votes.high === maxVote && votes.high > votes.mid * 1.05) chosenCat = 'high';

    var agreement = totalVotes > 0 ? maxVote / totalVotes : 0.5;

    /* === GENERER LA VALEUR === */
    var pred;

    if (chosenCat === 'low') {
      /* Predire entre 1.10 et 1.99x base sur la moyenne */
      pred = cl(longAvg * rr(0.35, 0.7), 1.10, 1.99);
      /* Ajuster selon l'intensite du signal baissier */
      if (votes.low > votes.mid * 1.3) pred = cl(pred * 0.85, 1.10, 1.99);
    } else if (chosenCat === 'high') {
      /* Predire 5x+ base sur la moyenne historique */
      var highBase = Math.max(longAvg, longMed) * rr(2.0, 4.5);
      pred = cl(highBase, 5.0, 25);
      /* Bonus si forte agreement */
      if (agreement > 0.42) pred = cl(pred * 1.1, 5.0, 25);
    } else {
      /* MID - categorie la plus frequente, centree sur la moyenne */
      pred = cl(longAvg * rr(0.65, 1.6), 2.0, 9.99);
      /* Ajuster finement selon momentum recent */
      if (mo.dir === 'up' && mo.strength > 0.3) {
        pred = cl(pred * 1.15, 2.0, 9.99);
      } else if (mo.dir === 'down' && mo.strength > 0.3) {
        pred = cl(pred * 0.9, 2.0, 9.99);
      }
    }

    /* Bruit controle */
    pred = pred * rr(0.93, 1.07);
    pred = cl(pred, 1.10, 25);

    /* === CONFIANCE DYNAMIQUE === */
    var conf = agreement * 72;

    /* Bonus volume de donnees */
    if (n >= 30) conf += 4;
    else if (n >= 20) conf += 3;
    else if (n >= 10) conf += 2;

    /* Bonus precision historique */
    var acc = getAccuracy();
    if (acc !== null) {
      if (acc >= 55) conf += 5;
      else if (acc >= 45) conf += 3;
      else conf += 1;
      signals.push({ text: 'precision_' + acc + '%', type: acc >= 45 ? 'up' : 'down' });
    }

    /* Bonus nombre de signaux */
    if (signals.length >= 6) conf += 2;

    /* Penalite volatilite extreme */
    if (vl > 5) conf -= 3;

    conf = cl(Math.round(conf), 25, 94);

    return {
      prediction: Math.round(pred * 100) / 100,
      confidence: conf,
      signals: signals.map(function(s) { return s.text; }),
      signalTypes: signals.map(function(s) { return s.type; }),
      category: chosenCat,
      rounds: n,
      avg: Math.round(longAvg * 100) / 100,
      std: Math.round(sd(fullHistory) * 100) / 100,
      accuracy: acc
    };
  }

  return { predict: predict };
})();

/* ============ STATE DETECTION ============ */
function getState() {
  if (!sessionHeaders) return Promise.reject('no session');
  return fetch(STATE_URL, { method: 'GET', headers: sessionHeaders }).then(function(r) {
    if (!r.ok) throw new Error('State HTTP ' + r.status);
    return r.json();
  });
}

function walk(o, fn) {
  var s = [o];
  while (s.length) {
    var x = s.pop();
    if (x && typeof x === 'object') { fn(x); for (var k in x) s.push(x[k]); }
  }
}

function detectState(d) {
  var cs = null, cb = null, cn = null;
  walk(d, function(obj) {
    for (var k in obj) {
      var key = k.toLowerCase(), val = obj[k];
      if (/(state|status|phase|mode)$/.test(key)) {
        if (typeof val === 'string' && !cs) cs = val.toLowerCase();
        if (typeof val === 'boolean' && cb === null) cb = val;
        if (typeof val === 'number' && cn === null) cn = val;
      }
      if (/(running|in_game|ingame|live)$/.test(key) && typeof val === 'boolean' && cb === null) cb = val;
    }
  });
  if (cb === true) return 'running';
  if (cb === false) return 'waiting';
  if (cs) {
    if ('running started start flying play playing live in_game'.indexOf(cs) !== -1) return 'running';
    if ('crashed crash ended end finished finish dead'.indexOf(cs) !== -1) return 'ended';
    if ('waiting wait starting betting idle prepare preparing ready countdown'.indexOf(cs) !== -1) return 'waiting';
  }
  if (cn === 1) return 'running';
  if (cn === 2) return 'ended';
  if (cn === 0) return 'waiting';
  return 'unknown';
}

function extractRoundId(d) {
  var id = null;
  walk(d, function(obj) {
    if (id) return;
    if (obj.round_id != null) id = obj.round_id;
    else if (obj.roundId != null) id = obj.roundId;
    else if (obj.id != null && typeof obj.id === 'string' && obj.id.indexOf('-') !== -1) id = obj.id;
  });
  return id;
}

/* ============ PREDICTION FLOW ============ */
function generatePrediction() {
  return fetchHistory().then(function(data) {
    var apiCoefs = extractCoefs(data);
    if (apiCoefs.length === 0) throw new Error('No crash data');

    /* Valider la prediction precedente avec le dernier resultat */
    var latestActual = apiCoefs[apiCoefs.length - 1];
    validateLastPrediction(latestActual);

    /* Fusionner avec la memoire stockee */
    allHistory = mergeWithMemory(apiCoefs);

    /* Nettoyer les vieilles predictions */
    clearOldPredictions();

    /* Lancer la prediction sur TOUT l'historique */
    var result = DVYSPredictor.predict(allHistory);

    /* Enregistrer la prediction */
    recordPrediction(result.prediction, result.confidence, result.category);

    return {
      prediction: result.prediction,
      confidence: result.confidence,
      signals: result.signals,
      signalTypes: result.signalTypes,
      category: result.category,
      last_rounds: apiCoefs.slice(-15).reverse(),
      total_rounds: result.rounds,
      avg: result.avg,
      std_dev: result.std,
      accuracy: result.accuracy,
      status: 'ok'
    };
  });
}

/* ============ DISPLAY ============ */
function displayPrediction(data) {
  var pred = parseFloat(data.prediction);
  if (isNaN(pred) || pred <= 0) {
    predVal.textContent = 'Erreur';
    predVal.style.color = '#ff4444';
    predVal.classList.remove('loading');
    return;
  }

  predVal.textContent = pred.toFixed(2) + 'x';
  predVal.classList.remove('loading');

  /* Couleur selon le seuil: bleu <2, violet 2-9.99, orange >=10 */
  if (pred >= 10.0) {
    predVal.style.color = '#ff9800';
    predVal.style.textShadow = '0 0 30px rgba(255,152,0,.5),0 0 60px rgba(255,152,0,.2)';
  } else if (pred >= 2.0) {
    predVal.style.color = '#b388ff';
    predVal.style.textShadow = '0 0 25px rgba(179,136,255,.5),0 0 50px rgba(179,136,255,.2)';
  } else {
    predVal.style.color = '#64b5f6';
    predVal.style.textShadow = '0 0 25px rgba(100,181,246,.4),0 0 50px rgba(100,181,246,.15)';
  }

  predConf.textContent = (data.confidence || 0) + '%';

  if (data.total_rounds) roundNum.textContent = '#' + data.total_rounds;
  if (data.total_rounds) dataInfo.textContent = '\u00b7 ' + data.total_rounds + ' tours';

  if (data.total_rounds && statRounds) statRounds.textContent = data.total_rounds;
  if (data.avg && statAvg) statAvg.textContent = data.avg + 'x';
  if (data.std_dev && statStd) statStd.textContent = data.std_dev;

  /* Signaux */
  sigContainer.innerHTML = '';
  if (data.signals && data.signals.length) {
    var types = data.signalTypes || [];
    data.signals.slice(0, 6).forEach(function(s, idx) {
      var el = document.createElement('span');
      el.className = 'sig';
      var t = types[idx] || 'info';
      if (t === 'up') el.classList.add('up');
      else if (t === 'down') el.classList.add('down');
      else el.classList.add('info');
      el.textContent = s.replace(/_/g, ' ');
      sigContainer.appendChild(el);
    });
  }

  /* Historique (si l'element existe) */
  if (histChips) {
    histChips.innerHTML = '';
    if (data.last_rounds && data.last_rounds.length) {
      data.last_rounds.slice(0, 10).forEach(function(v) {
        var el = document.createElement('span');
        el.className = 'chip';
        var fv = parseFloat(v);
        if (fv < 2) el.classList.add('low');
        else if (fv < 5) el.classList.add('mid');
        else el.classList.add('high');
        el.textContent = fv.toFixed(2) + 'x';
        histChips.appendChild(el);
      });
    }
  }
}

/* ============ PREDICTION TRIGGER ============ */
function doPredict() {
  if (!sessionHeaders) return;
  predVal.textContent = 'Analyse...';
  predVal.classList.add('loading');
  generatePrediction().then(function(data) {
    displayPrediction(data);
  }).catch(function(e) {
    console.error('Prediction error:', e);
    predVal.textContent = 'Reconnexion...';
    predVal.classList.add('loading');
    setTimeout(doPredict, 6000);
  });
}

/* ============ POLLING ============ */
var RUN = { running: 1 }, END = { ended: 1 }, WAIT = { waiting: 1 };

function triggerPredictionFor(roundId) {
  if (!roundId || predictedForRoundId === roundId) return;
  predictedForRoundId = roundId;
  doPredict();
}

function poll() {
  if (!sessionHeaders) { pollingActive = false; return; }
  getState().then(function(data) {
    var stateNow = detectState(data);
    var rid = extractRoundId(data) || Date.now();
    if (RUN[stateNow] && rid !== currentRoundId) currentRoundId = rid;
    if (lastState && RUN[lastState] && (END[stateNow] || WAIT[stateNow])) triggerPredictionFor(rid);
    if (WAIT[stateNow] && predictedForRoundId !== rid) triggerPredictionFor(rid);
    if (RUN[stateNow]) headerStatus.textContent = 'En vol';
    else if (WAIT[stateNow]) headerStatus.textContent = 'Attente';
    else headerStatus.textContent = 'Actif';
    lastState = stateNow;
  }).catch(function(e) {
    console.error('Poll error:', e);
  }).finally(function() {
    setTimeout(poll, POLL_MS);
  });
}

function startPolling() {
  if (pollingActive) return;
  pollingActive = true;
  poll();
}

/* ============ INIT ============ */
(function init() {
  gameFrame.src = 'https://1play.gamedev-tech.cc/lucky_grm/vgs/?b=' + encodeURIComponent(TOKEN_B) + '&language=en&pid=1win&pik=019aa5d3-290c-7469-b133-89d1948a968c';
  headerStatus.textContent = 'Auth...';

  /* Charger la memoire au demarrage */
  var mem = loadMemory();
  if (mem.history.length > 0) {
    dataInfo.textContent = '\u00b7 ' + mem.history.length + ' tours';
  }

  authenticate(TOKEN_B).then(function(data) {
    liveDot.classList.remove('warn');
    liveDot.classList.remove('off');
    headerStatus.textContent = 'Actif';

    var acc = getAccuracy();
    var msg = 'DVYS connecte - Predictions actives';
    if (acc !== null) msg += ' (' + acc + '% precision)';
    showToast(msg, 3500);

    doPredict();
    startPolling();
  }).catch(function(e) {
    headerStatus.textContent = 'Erreur';
    liveDot.classList.remove('warn');
    liveDot.classList.add('off');
    predVal.textContent = '--';
    predVal.classList.remove('loading');
    showToast('Auth echouee - Reessayer', 4000);
    setTimeout(function() { init(); }, 10000);
  });
})();
